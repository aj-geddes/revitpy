# Pre-commit hooks for RevitPy
# See https://pre-commit.com for more information
# Install: pre-commit install && pre-commit install --hook-type pre-push
# Run all: pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      # Run the linter with auto-fix (scoped to match CI)
      - id: ruff
        args: [--fix]
        files: '^(revitpy|tests)/'
      # Run the formatter (scoped to match CI)
      - id: ruff-format
        files: '^(revitpy|tests)/'

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        pass_filenames: false
        args: [revitpy]
        additional_dependencies:
          - pydantic>=2.0.0
          - types-PyYAML
          - types-aiofiles

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Run tests on pre-push (not pre-commit, to keep commits fast)
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest tests/ -x -q --no-header
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
