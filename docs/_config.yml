# Jekyll Configuration for RevitPy Documentation
# Three-tier documentation: Developer, Technical, User

# Site settings
title: RevitPy
tagline: Modern Python Framework for Revit Development
description: >-
  RevitPy is a modern Python framework for Autodesk Revit development with LINQ-style queries,
  ORM, async support, IFC interoperability, AI agent integration, and cloud automation.
baseurl: "/revitpy"
url: "https://aj-geddes.github.io"
author: aj-geddes
repository: aj-geddes/revitpy

# Branding
logo: /assets/images/logo.svg

# Social / SEO (used by jekyll-seo-tag)
twitter:
  card: summary
social:
  name: RevitPy
  links:
    - https://github.com/aj-geddes/revitpy

# Default image for social sharing
defaults_og_image: /assets/images/logo.svg

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty
timezone: UTC

# Kramdown settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false
      css_class: highlight
    span:
      css_class: highlight

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "developer"
    values:
      layout: "page"
      doc_tier: "developer"
  - scope:
      path: "technical"
    values:
      layout: "page"
      doc_tier: "technical"
  - scope:
      path: "user"
    values:
      layout: "page"
      doc_tier: "user"

# Navigation
navigation:
  main:
    - title: Home
      url: /
    - title: Getting Started
      url: /user/getting-started/
    - title: Developer
      url: /developer/
    - title: Technical
      url: /technical/
    - title: User Guide
      url: /user/
    - title: GitHub
      url: https://github.com/aj-geddes/revitpy
      external: true

  developer:
    - title: Overview
      url: /developer/
    - title: Architecture
      url: /developer/architecture/
    - title: Setup Guide
      url: /developer/setup/
    - title: API Reference
      url: /developer/api-reference/
    - title: Testing
      url: /developer/testing/
    - title: Contributing
      url: /developer/contributing/
    - title: Code Style
      url: /developer/code-style/

  technical:
    - title: Overview
      url: /technical/
    - title: System Design
      url: /technical/system-design/
    - title: Data Model
      url: /technical/data-model/
    - title: Performance
      url: /technical/performance/
    - title: Security
      url: /technical/security/
    - title: Infrastructure
      url: /technical/infrastructure/

  user:
    - title: Overview
      url: /user/
    - title: Getting Started
      url: /user/getting-started/
    - title: Query Builder
      url: /user/features/query-builder/
    - title: ORM
      url: /user/features/orm/
    - title: Events
      url: /user/features/events/
    - title: Extensions
      url: /user/features/extensions/
    - title: Async Support
      url: /user/features/async/
    - title: Testing Utilities
      url: /user/features/testing/
    - title: Quantity Extraction
      url: /user/features/extract/
    - title: IFC Interop
      url: /user/features/ifc/
    - title: AI & MCP Server
      url: /user/features/ai/
    - title: Sustainability
      url: /user/features/sustainability/
    - title: Speckle Interop
      url: /user/features/interop/
    - title: Cloud Automation
      url: /user/features/cloud/
    - title: Configuration
      url: /user/configuration/
    - title: FAQ
      url: /user/faq/
    - title: Troubleshooting
      url: /user/troubleshooting/

  footer:
    documentation:
      - title: Getting Started
        url: /user/getting-started/
      - title: API Reference
        url: /developer/api-reference/
      - title: User Guide
        url: /user/
    community:
      - title: GitHub
        url: https://github.com/aj-geddes/revitpy
      - title: Issues
        url: https://github.com/aj-geddes/revitpy/issues
      - title: Contributing
        url: /developer/contributing/

# Plugins (GitHub Pages safe)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
  - README.md

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Features
features:
  copy_code_button: true
  dark_mode: true
  search: true
  toc: true
