<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% seo %}

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "{% if page.layout == 'api' %}TechArticle{% else %}WebPage{% endif %}",
        "name": "{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}",
        "description": "{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}",
        "url": "{{ page.url | absolute_url }}",
        "publisher": {
            "@type": "Organization",
            "name": "{{ site.title }}",
            "url": "{{ site.url }}"
        }
    }
    </script>

    {% if page.url == "/" %}
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "RevitPy",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Windows",
        "description": "{{ site.description }}",
        "url": "{{ page.url | absolute_url }}",
        "downloadUrl": "https://github.com/aj-geddes/revitpy",
        "programmingLanguage": "Python",
        "softwareVersion": "0.1.0",
        "license": "https://opensource.org/licenses/MIT",
        "author": {
            "@type": "Organization",
            "name": "RevitPy Team",
            "url": "https://github.com/aj-geddes/revitpy"
        },
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        }
    }
    </script>
    {% endif %}

    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
    <meta name="theme-color" content="#2563eb">
</head>
<body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>
    <a href="#main-content" class="sr-only">Skip to main content</a>

    {% include header.html %}

    {% if page.doc_tier %}
    <div class="container">
        <div class="content-wrapper">
            {% include sidebar.html %}
            <main id="main-content" class="main-content" role="main">
                {{ content }}
            </main>
        </div>
    </div>
    {% else %}
    <main id="main-content" role="main">
        {{ content }}
    </main>
    {% endif %}

    {% include footer.html %}

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
